<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150">
  <!-- PLL League Logo: Lacrosse head — gold on black, V-strings + lace + X knot -->
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#c8a200"/>
    </linearGradient>
  </defs>
  
  <rect x="0" y="0" width="100" height="150" rx="8" fill="#0a0a0a"/>
  
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer Rim -->
    <path d="M 50 18 C 70 18, 82 28, 82 42 C 82 52, 72 58, 68 62 C 64 66, 62 72, 62 80 L 62 118 C 62 124, 58 128, 50 128 C 42 128, 38 124, 38 118 L 38 80 C 38 72, 36 66, 32 62 C 28 58, 18 52, 18 42 C 18 28, 30 18, 50 18 Z" 
          stroke="url(#goldGrad)" stroke-width="4.5"/>
    
    <!-- Inner Rim -->
    <path d="M 50 23 C 67 23, 77 31, 77 42 C 77 50, 69 55, 65 59 C 61 63, 59 69, 59 80 L 59 118 C 59 122, 56 124, 50 124 C 44 124, 41 122, 41 118 L 41 80 C 41 69, 39 63, 35 59 C 31 55, 23 50, 23 42 C 23 31, 33 23, 50 23 Z" 
          stroke="url(#goldGrad)" stroke-width="2"/>
    
    <!-- Shooting Strings (2 V-shapes near scoop) -->
    <polyline points="26,38 50,48 74,38" stroke="#ffd700" stroke-width="1.8"/>
    <polyline points="29,46 50,56 71,46" stroke="#ffd700" stroke-width="1.5"/>
    
    <!-- Curved Pocket Lace -->
    <path d="M 32 64 Q 50 74 68 64" stroke="#ffd700" stroke-width="1.5"/>
    
    <!-- Bottom X Knot -->
    <line x1="43" y1="110" x2="57" y2="122" stroke="#ffd700" stroke-width="1.8"/>
    <line x1="57" y1="110" x2="43" y2="122" stroke="#ffd700" stroke-width="1.8"/>
  </g>
</svg>